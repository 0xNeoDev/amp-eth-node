global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "reth"
    static_configs:
      - targets: ["reth:9001"]
    metrics_path: /metrics

  - job_name: "lighthouse"
    static_configs:
      - targets: ["lighthouse:5054"]
    metrics_path: /metrics

  - job_name: "amp"
    static_configs:
      - targets: ["amp:1610"]
    metrics_path: /metrics

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]
    metrics_path: /metrics

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
